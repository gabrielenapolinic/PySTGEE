<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landslide Early Warning - PySTGEE</title>
  <!-- Leaflet (mappa) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Pako (decompressione .gz) -->
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <style>
    body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
    #map { height: 100vh; width: 100%; }
    .legend {
      position: absolute; bottom: 20px; right: 20px;
      background: rgba(255, 255, 255, 0.95); padding: 15px;
      border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.2);
      z-index: 1000;
    }
    .legend h4 { margin: 0 0 10px 0; color: #333; }
    .legend-item { display: flex; align-items: center; margin: 5px 0; }
    .legend-color {
      width: 20px; height: 20px; margin-right: 10px;
      border: 1px solid #777;
    }
    .last-update {
      position: absolute; bottom: 20px; left: 20px;
      background: rgba(255, 255, 255, 0.95); padding: 10px;
      border-radius: 5px; z-index: 1000; font-size: 14px;
    }
    .loading {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); background: white;
      padding: 20px; border-radius: 5px; z-index: 1000;
      text-align: center;
    }
    .spinner {
      border: 4px solid rgba(0, 0, 0, 0.1); border-radius: 50%;
      border-top: 4px solid #3498db; width: 30px; height: 30px;
      animation: spin 1s linear infinite; margin: 0 auto 10px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="legend">
    <h4>Landslide Susceptibility</h4>
    <div class="legend-item">
      <div class="legend-color" style="background-color: #ff0000;"></div>
      <span>High Risk (>70%)</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background-color: #ffcc00;"></div>
      <span>Medium Risk (40-70%)</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background-color: #00ff00;"></div>
      <span>Low Risk (<40%)</span>
    </div>
  </div>
  <div class="last-update" id="lastUpdate">Loading...</div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>Loading prediction map...</div>
  </div>

  <script>
    // Configurazione (modifica se il repo cambia)
    const REPO_OWNER = 'gabrielenapolinic';
    const REPO_NAME = 'PySTGEE';
    const BRANCH = 'main';
    const MAPS_FOLDER = 'daily_maps';

    // Inizializza la mappa (centrata sul Giappone, area Kii)
    const map = L.map('map').setView([34.5, 136.1], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    // Funzione per ottenere l'ultimo file GeoJSON
    async function getLatestGeoJSON() {
      const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${MAPS_FOLDER}?ref=${BRANCH}`;
      const response = await fetch(apiUrl);
      const files = await response.json();
      const geojsonFiles = files
        .filter(file => file.name.endsWith('.geojson.gz') && file.type === 'file')
        .sort((a, b) => new Date(b.name.split('_')[1].split('.')[0]) - new Date(a.name.split('_')[1].split('.')[0]));
      if (geojsonFiles.length === 0) throw new Error('No GeoJSON files found');
      return geojsonFiles[0];
    }

    // Funzione per scaricare e decomprimere il GeoJSON
    async function fetchAndDecompressGeoJSON(file) {
      const response = await fetch(file.download_url);
      const compressedData = await response.arrayBuffer();
      const decompressed = pako.ungzip(new Uint8Array(compressedData), { to: 'string' });
      return JSON.parse(decompressed);
    }

    // Stile in base alla suscettibilità
    function getColor(prob) {
      return prob > 0.7 ? '#ff0000' : prob > 0.4 ? '#ffcc00' : '#00ff00';
    }
    function style(feature) {
      const prob = feature.properties.Final_Dynamic_Susceptibility;
      return {
        fillColor: getColor(prob),
        weight: 0.5,
        opacity: 1,
        color: '#777',
        fillOpacity: 0.7
      };
    }

    // Popup con dettagli
    function onEachFeature(feature, layer) {
      const prob = feature.properties.Final_Dynamic_Susceptibility;
      const date = feature.properties ? feature.properties.date || feature.properties.poly_uid || 'N/A' : 'N/A';
      layer.bindPopup(`
        <b>Susceptibility:</b> ${(prob * 100).toFixed(1)}%<br>
        <b>Date:</b> ${date}
      `);
    }

    // Caricamento mappa
    async function loadMap() {
      try {
        document.getElementById('loading').style.display = 'block';
        const latestFile = await getLatestGeoJSON();
        const date = latestFile.name.split('_')[1].split('.')[0];
        document.getElementById('lastUpdate').textContent = `Last update: ${date}`;

        const geojson = await fetchAndDecompressGeoJSON(latestFile);
        L.geoJSON(geojson, { style: style, onEachFeature: onEachFeature }).addTo(map);

        document.getElementById('loading').style.display = 'none';
      } catch (error) {
        document.getElementById('loading').innerHTML = `
          <div style="color: red;">Error: ${error.message}</div>
          <div>Check if the workflow ran successfully.</div>
        `;
        console.error('Error:', error);
      }
    }

    // Avvia al caricamento della pagina
    document.addEventListener('DOMContentLoaded', loadMap);
  </script>
</body>
</html>
