name: Daily Landslide Prediction

# Automation trigger: runs every day at 03:00 UTC or manually via button
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  run-prediction:
    runs-on: ubuntu-latest

    # Permissions required to push generated maps back to the repository
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true        # CRITICAL: Forces download of real LFS files (.gpkg / .joblib)
          fetch-depth: 1   # Fetches only the latest commit for maximum speed

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Spatio-Temporal Prediction Script (For Tomorrow)
        env:
          EE_PRIVATE_KEY: ${{ secrets.EE_PRIVATE_KEY }}
        run: |
          python daily_prediction.py

      - name: Commit and Push new map
        run: |
          cp daily_maps/prediction_*.html daily_maps/latest_map.html
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add daily_maps/latest_map.html
          git commit -m "Aggiornamento mappa giornaliera" || echo "No changes to commit"
          git pull origin main --rebase
          git push
