name: Daily Landslide Prediction Pipeline

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  run-prediction:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install earthengine-api pandas geopandas numpy folium scikit-learn rasterio pillow matplotlib joblib branca

      - name: Run Spatio-Temporal Prediction Pipeline
        env:
          EE_PRIVATE_KEY: ${{ secrets.EE_PRIVATE_KEY }}
        run: |
          python daily_prediction.py

      - name: Commit and Push Latest Forecast Maps
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add daily_maps/ index.html
          git commit -m "Automated prediction update for tomorrow's forecast" || echo "No changes to commit"
          git pull origin main --rebase
          git push
